x-lagoon-project: &lagoon-project
  platform-testing

x-environment: &default-environment
  LAGOON_PROJECT: *lagoon-project
  LAGOON_ROUTE: &default-url ${LOCALDEV_URL:-http://platform-testing.docker.amazee.io}

services:
  app:
    build:
      context: .
      dockerfile: go.app.dockerfile
    labels:
      lagoon.type: basic
      lagoon.port: 3000
      lagoon.autogeneratedroute: true
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app/web:delegated
      - ./sites.yml:/app/sites.yml:delegated
    environment:
      << : *default-environment
      DATABASE_URL: postgres://platform:platform@postgres:5432/platform?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: cypress.worker.dockerfile
    labels:
      lagoon.type: basic
    volumes:
      - ./cypress:/app/cypress:delegated
    environment:
      << : *default-environment
      APP_URL: http://app:3000
      POLL_INTERVAL: "5000"
    depends_on:
      - app
    shm_size: '2gb'

  postgres:
    image: postgres:16-alpine
    labels:
      lagoon.type: postgres-single
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    labels:
      lagoon.type: persistent
      lagoon.persistent.size: 5Gi
